<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verify Password - Material Flask Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <h1 class="login-title">Verify Password</h1>
            <p class="login-subtitle">Confirm your password to change username.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{{ 'login-success' if category == 'success' else 'login-error' }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="login-form" method="post" action="{{ url_for('verify_username_password') }}">
                <label class="login-field-label" for="current_password">Current Password</label>
                <div class="password-field-wrap">
                    <input id="current_password" class="login-input password-input" type="password" name="current_password" autocomplete="current-password" required>
                    <button id="toggle-password-btn" class="password-toggle-btn" type="button" aria-label="Show password" aria-pressed="false">Show</button>
                </div>
                <button class="login-submit" type="submit">Verify</button>
            </form>

            <p class="login-help"><a class="login-link" href="{{ url_for('profile') }}">Back to Profile</a></p>
        </section>
    </main>
    <script>
        const passwordInput = document.getElementById("current_password");
        const togglePasswordButton = document.getElementById("toggle-password-btn");

        togglePasswordButton.addEventListener("click", () => {
            const shouldShowPassword = passwordInput.type === "password";
            passwordInput.type = shouldShowPassword ? "text" : "password";
            togglePasswordButton.textContent = shouldShowPassword ? "Hide" : "Show";
            togglePasswordButton.setAttribute("aria-label", shouldShowPassword ? "Hide password" : "Show password");
            togglePasswordButton.setAttribute("aria-pressed", shouldShowPassword ? "true" : "false");
            passwordInput.focus();
        });
    </script>
</body>
</html>
