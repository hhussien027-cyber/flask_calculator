<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Password - Material Flask Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <h1 class="login-title">Change Password</h1>
            <p class="login-subtitle">Update your account password securely.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{{ 'login-success' if category == 'success' else 'login-error' }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="login-form" method="post" action="{{ url_for('change_password') }}">
                <label class="login-field-label" for="current_password">Current Password</label>
                <div class="password-field-wrap">
                    <input id="current_password" class="login-input password-input" type="password" name="current_password" autocomplete="current-password" required>
                    <button class="password-toggle-btn" type="button" data-target="current_password" aria-label="Show password" aria-pressed="false">Show</button>
                </div>

                <label class="login-field-label" for="new_password">New Password</label>
                <div class="password-field-wrap">
                    <input id="new_password" class="login-input password-input" type="password" name="new_password" autocomplete="new-password" required>
                    <button class="password-toggle-btn" type="button" data-target="new_password" aria-label="Show password" aria-pressed="false">Show</button>
                </div>

                <label class="login-field-label" for="confirm_new_password">Confirm New Password</label>
                <div class="password-field-wrap">
                    <input id="confirm_new_password" class="login-input password-input" type="password" name="confirm_new_password" autocomplete="new-password" required>
                    <button class="password-toggle-btn" type="button" data-target="confirm_new_password" aria-label="Show password" aria-pressed="false">Show</button>
                </div>

                <button class="login-submit" type="submit">Update Password</button>
            </form>

            <p class="login-help"><a class="login-link" href="{{ url_for('profile') }}">Back to Profile</a></p>
        </section>
    </main>
    <script>
        const passwordToggleButtons = document.querySelectorAll(".password-toggle-btn");

        passwordToggleButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const targetId = button.dataset.target;
                const input = document.getElementById(targetId);
                if (!input) {
                    return;
                }
                const shouldShowPassword = input.type === "password";
                input.type = shouldShowPassword ? "text" : "password";
                button.textContent = shouldShowPassword ? "Hide" : "Show";
                button.setAttribute("aria-label", shouldShowPassword ? "Hide password" : "Show password");
                button.setAttribute("aria-pressed", shouldShowPassword ? "true" : "false");
                input.focus();
            });
        });
    </script>
</body>
</html>
