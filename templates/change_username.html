<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Username - Material Flask Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <h1 class="login-title">Change Username</h1>
            <p class="login-subtitle">Choose a new unique username.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="{{ 'login-success' if category == 'success' else 'login-error' }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="login-form" method="post" action="{{ url_for('change_username') }}">
                <label class="login-field-label" for="new_username">New Username</label>
                <input id="new_username" class="login-input" type="text" name="new_username" autocomplete="username" required>

                <label class="login-field-label" for="confirm_username">Confirm Username</label>
                <input id="confirm_username" class="login-input" type="text" name="confirm_username" autocomplete="username" required>

                <button class="login-submit" type="submit">Update Username</button>
            </form>

            <p class="login-help"><a class="login-link" href="{{ url_for('profile') }}">Back to Profile</a></p>
        </section>
    </main>
</body>
</html>
